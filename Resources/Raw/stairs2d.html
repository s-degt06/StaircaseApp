<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stairs 2D</title>
<style>
html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #ffffff;
    user-select: none;
}
canvas { display: block; cursor: grab; }
canvas.grabbing { cursor: grabbing; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// ─────────────────────────────────────────────
//  Параметры сцены
// ─────────────────────────────────────────────

let params = { w: 2, h: 1, d: 1, count: 1, mode: 0, diff: 0, middle: 0 };

// Камера
let cam = { x: 0, y: 0, scale: 1 };

// ─────────────────────────────────────────────
//  Resize
// ─────────────────────────────────────────────

function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    draw();
}
window.addEventListener("resize", resize);

// ─────────────────────────────────────────────
//  Pan & Zoom
// ─────────────────────────────────────────────

let drag = null;

canvas.addEventListener("mousedown", e => {
    drag = { sx: e.clientX, sy: e.clientY, cx: cam.x, cy: cam.y };
    canvas.classList.add("grabbing");
});
canvas.addEventListener("mousemove", e => {
    if (!drag) return;
    cam.x = drag.cx + (e.clientX - drag.sx);
    cam.y = drag.cy + (e.clientY - drag.sy);
    draw();
});
canvas.addEventListener("mouseup",   () => { drag = null; canvas.classList.remove("grabbing"); });
canvas.addEventListener("mouseleave",() => { drag = null; canvas.classList.remove("grabbing"); });

canvas.addEventListener("wheel", e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    // Зум относительно курсора
    const mx = e.clientX, my = e.clientY;
    cam.x = mx - (mx - cam.x) * factor;
    cam.y = my - (my - cam.y) * factor;
    cam.scale *= factor;
    draw();
}, { passive: false });

// Touch
let touches = null;
canvas.addEventListener("touchstart", e => {
    if (e.touches.length === 1) {
        drag = { sx: e.touches[0].clientX, sy: e.touches[0].clientY, cx: cam.x, cy: cam.y };
    } else if (e.touches.length === 2) {
        drag = null;
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        touches = { dist: Math.hypot(dx, dy), cx: cam.x, cy: cam.y, scale: cam.scale };
    }
}, { passive: true });
canvas.addEventListener("touchmove", e => {
    if (e.touches.length === 1 && drag) {
        cam.x = drag.cx + (e.touches[0].clientX - drag.sx);
        cam.y = drag.cy + (e.touches[0].clientY - drag.sy);
        draw();
    } else if (e.touches.length === 2 && touches) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        const factor = dist / touches.dist;
        cam.scale = touches.scale * factor;
        cam.x = touches.cx;
        cam.y = touches.cy;
        draw();
    }
}, { passive: true });
canvas.addEventListener("touchend", () => { drag = null; touches = null; });

// ─────────────────────────────────────────────
//  Построение прямоугольников (вид сверху)
//  Координаты в мировом пространстве (мм),
//  потом переводим в экранные через worldToScreen.
// ─────────────────────────────────────────────

// Делит count на нижний/верхний пролёт.
// usable = count минус площадка (middle=0, -1) или забежные ступени (middle=2, -2).
// База: floor -> нижний, ceil -> верхний (при нечётном usable верхний получает на 1 больше).
// diff сдвигает ступени с нижнего пролёта на верхний.
function splitCounts(count, diff, middle) {
    const consumed = middle === 0 ? 1 : middle;
    const usable = count - consumed;
    const baseLower = Math.floor(usable / 2);
    const baseUpper = Math.ceil(usable / 2);
    return {
        countLower: Math.max(0, baseLower - diff),
        countUpper: Math.max(0, baseUpper + diff),
    };
}

/**
 * Вид сверху: ось X — ширина, ось Z — глубина (вниз на экране).
 * Каждая фигура — либо прямоугольник {x,z,w,d}, либо многоугольник
 * {points:[[x,z],...]} (для забежных ступеней-вееров).
 */
function buildRects({ w, h, d, count, mode, diff, middle }) {
    const rects = [];

    const add = (x, z, rw, rd, label) =>
        rects.push({ x, z, w: rw, d: rd, label });

    const addPoly = (points, label) =>
        rects.push({ points, label });

    if (mode === 0) {
        // Mode 1: одна цепочка по диагонали
        for (let i = 0; i < count; i++) {
            add(-w / 2, -i * d, w, d, i === 0 ? "1" : "");
        }
        return rects;
    }

    if (mode === 1 || mode === 2) {
        const mirror = mode === 1 ? 1 : -1;

        const leftX  = -w / 2 * mirror - w / 2;
        const rightX =  w / 2 * mirror - w / 2;

        // Центральный блок: при middle>0 — subSteps=middle/2 забежных
        // ступеней на каждую сторону. При subSteps=1 это просто целый
        // квадрат (как было). При subSteps>1 — веер треугольных/
        // четырёхугольных ступеней из общего угла P (см. fanWedgePolygons).
        if (middle > 0) {
            const subSteps = middle / 2;
            if (subSteps === 1) {
                add(leftX,  -w / 2, w, w, "c1");
                add(rightX, -w / 2, w, w, "c2");
            } else {
                const Px = rightX; // общий угол P — общая внутренняя грань
                const Pz = -w / 2;
                fanWedgePolygons(w, subSteps, -1, Px, Pz).forEach((pts, i) => addPoly(pts, "c1_" + i));
                fanWedgePolygons(w, subSteps, +1, Px, Pz).forEach((pts, i) => addPoly(pts, "c2_" + i));
            }
        } else {
            add(-w, -w / 2, 2 * w, w, "c");
        }

        const startZ = -(w / 2 + d);

        const { countLower, countUpper } = splitCounts(count, diff, middle);

        // Нижний пролёт
        for (let i = 0; i < countLower; i++) {
            add(leftX, startZ - i * d, w, d, "");
        }
        // Верхний пролёт
        for (let i = 0; i < countUpper; i++) {
            add(rightX, startZ - i * d, w, d, "");
        }
        return rects;
    }

    if (mode === 3 || mode === 4) {
        const sideSign = mode === 3 ? -1 : 1;

        const halfW = w / 2;
        const halfD = d / 2;

        // Центральный квадрат либо два winder-квадрата при middle=2.
        // turnExtent — насколько площадка/винты "съедают" место у каждого пролёта
        // (половина ширины ступени для обычной площадки, целая — для забежных).
        let turnExtent;
        if (middle === 2) {
            add(-w / 2, -w, w, w, "c1");
            add(sideSign > 0 ? 0 : -w, -w / 2, w, w, "c2");
            turnExtent = w;
        } else if (middle === 3) {
            const Px = sideSign > 0 ? halfW : -halfW;
            const Pz = -halfW;
            const entrySign = -sideSign;

            fanWedgePolygons(w, 3, entrySign, Px, Pz)
                .forEach((pts, i) => addPoly(pts, (sideSign > 0 ? "c1_" : "c2_") + i));

            turnExtent = halfW;
        } else {
            add(-w / 2, -w / 2, w, w, "c");
            turnExtent = halfW;
        }

        const { countLower, countUpper } = splitCounts(count, diff, middle);

        // Нижний пролёт (по Z)
        const backStartZ = -(turnExtent + halfD + d / 2);
        for (let i = 0; i < countLower; i++) {
            add(-w / 2, backStartZ - i * d, w, d, "");
        }

        // Верхний пролёт (по X)
        const sideStartX = sideSign * (turnExtent + d / 2) - d / 2;
        for (let i = 0; i < countUpper; i++) {
            add(sideStartX + sideSign * i * d, -w / 2, d, w, "");
        }
        return rects;
    }

    return rects;
}

// Веер забежных ступеней одного winder-квадрата стороны w. Общий угол —
// точка P = (px, pz). "Входная" сторона квадрата направлена по оси X со
// знаком entrySign, "выходная" — всегда в +Z. Делит прямой угол (90°) на
// subSteps равных секторов; если граница 45° (диагональ квадрата) попадает
// строго внутрь сектора, добавляет внешний угол квадрата как 4-ю вершину
// (получается четырёхугольник вместо треугольника). Возвращает массив
// многоугольников в мировых координатах.
function fanWedgePolygons(w, subSteps, entrySign, px, pz) {
    const angleStep = 90 / subSteps;
    const boundary = (deg) => {
        const rad = deg * Math.PI / 180;
        return deg <= 45
            ? { u: w, v: w * Math.tan(rad) }
            : { u: w / Math.tan(rad), v: w };
    };
    const polys = [];
    for (let i = 0; i < subSteps; i++) {
        const a0 = i * angleStep;
        const a1 = (i + 1) * angleStep;
        const b0 = boundary(a0);
        const b1 = boundary(a1);
        const pts = [[0, 0], [b0.u, b0.v]];
        if (a0 < 45 && a1 > 45) pts.push([w, w]); // сектор накрывает внешний угол
        pts.push([b1.u, b1.v]);
        polys.push(pts.map(([u, v]) => [px + entrySign * u, pz + v]));
    }
    return polys;
}

// ─────────────────────────────────────────────
//  Отрисовка
// ─────────────────────────────────────────────

const FILL   = "#ffffff";
const STROKE = "#000000";
const TEXT   = "#0D47A1";

function worldToScreen(wx, wz) {
    // Масштаб: 1мм → scale пикселей, центр экрана + смещение камеры
    const cx = canvas.width  / 2 + cam.x;
    const cy = canvas.height / 2 + cam.y;
    return [cx + wx * cam.scale, cy + wz * cam.scale];
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const rects = buildRects(params);

    for (const r of rects) {
        ctx.fillStyle   = FILL;
        ctx.strokeStyle = STROKE;
        ctx.lineWidth   = 1.5;

        ctx.beginPath();
        if (r.points) {
            const [x0, z0] = worldToScreen(r.points[0][0], r.points[0][1]);
            ctx.moveTo(x0, z0);
            for (let i = 1; i < r.points.length; i++) {
                const [x, z] = worldToScreen(r.points[i][0], r.points[i][1]);
                ctx.lineTo(x, z);
            }
            ctx.closePath();
        } else {
            const [sx, sy] = worldToScreen(r.x, r.z);
            const sw = r.w * cam.scale;
            const sd = r.d * cam.scale;
            ctx.rect(sx, sy, sw, sd);
        }
        ctx.fill();
        ctx.stroke();
    }
}

// ─────────────────────────────────────────────
//  API
// ─────────────────────────────────────────────

window.updateParams = (w, h, d, count, mode, diff = 0, middle = 0) => {
    params = {
        w: w / 100,
        h: h / 100,
        d: d / 100,
        count: Math.max(1, count),
        mode,
        diff:   Math.max(0, diff),
        middle,
    };

    // Автомасштаб при первом вызове: подбираем scale чтобы сцена влезла
    const totalSize = Math.max(w, d * count) / 100;
    cam.scale = Math.min(canvas.width, canvas.height) / (totalSize * 2.5);
    cam.x = 0;
    cam.y = 0;

    draw();
};

// ─────────────────────────────────────────────
//  Старт
// ─────────────────────────────────────────────

resize();
</script>
</body>
</html>

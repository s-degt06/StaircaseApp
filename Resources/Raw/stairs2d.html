<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stairs 2D</title>
<style>
html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #ffffff;
    user-select: none;
}
canvas { display: block; cursor: grab; }
canvas.grabbing { cursor: grabbing; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="stairsGeometry.js"></script>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// ─────────────────────────────────────────────
//  Параметры сцены
// ─────────────────────────────────────────────

let params = { w: 2, h: 1, d: 1, count: 1, mode: 0, diff: 0, middle: 0 };

// Камера
let cam = { x: 0, y: 0, scale: 1 };
let initialized = false;

// ─────────────────────────────────────────────
//  Resize
// ─────────────────────────────────────────────

function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    draw();
}
window.addEventListener("resize", resize);

// ─────────────────────────────────────────────
//  Pan & Zoom
// ─────────────────────────────────────────────

let drag = null;

canvas.addEventListener("mousedown", e => {
    drag = { sx: e.clientX, sy: e.clientY, cx: cam.x, cy: cam.y };
    canvas.classList.add("grabbing");
});
canvas.addEventListener("mousemove", e => {
    if (!drag) return;
    cam.x = drag.cx + (e.clientX - drag.sx);
    cam.y = drag.cy + (e.clientY - drag.sy);
    draw();
});
canvas.addEventListener("mouseup",   () => { drag = null; canvas.classList.remove("grabbing"); });
canvas.addEventListener("mouseleave",() => { drag = null; canvas.classList.remove("grabbing"); });

canvas.addEventListener("wheel", e => {
    e.preventDefault();

    const factor = e.deltaY < 0 ? 1.1 : 0.9;

    const mx = e.clientX;
    const my = e.clientY;

    const wx = (mx - canvas.width  / 2 - cam.x) / cam.scale;
    const wz = (my - canvas.height / 2 - cam.y) / cam.scale;

    cam.scale *= factor;

    cam.x = mx - canvas.width  / 2 - wx * cam.scale;
    cam.y = my - canvas.height / 2 - wz * cam.scale;

    draw();
}, { passive: false });

// Touch
let touches = null;
canvas.addEventListener("touchstart", e => {
    if (e.touches.length === 1) {
        drag = { sx: e.touches[0].clientX, sy: e.touches[0].clientY, cx: cam.x, cy: cam.y };
    } else if (e.touches.length === 2) {
        drag = null;
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        touches = { dist: Math.hypot(dx, dy), cx: cam.x, cy: cam.y, scale: cam.scale };
    }
}, { passive: true });
canvas.addEventListener("touchmove", e => {
    if (e.touches.length === 1 && drag) {
        cam.x = drag.cx + (e.touches[0].clientX - drag.sx);
        cam.y = drag.cy + (e.touches[0].clientY - drag.sy);
        draw();
    } else if (e.touches.length === 2 && touches) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        const factor = dist / touches.dist;
        cam.scale = touches.scale * factor;
        cam.x = touches.cx;
        cam.y = touches.cy;
        draw();
    }
}, { passive: true });
canvas.addEventListener("touchend", () => { drag = null; touches = null; });

// ─────────────────────────────────────────────
//  Отрисовка
//  buildRects (геометрия фигур) теперь приходит из stairsGeometry.js —
//  здесь только перевод мировых координат в экранные и сам рисунок.
// ─────────────────────────────────────────────

const FILL   = "#ffffff";
const STROKE = "#000000";
const TEXT   = "#0D47A1";

function worldToScreen(wx, wz) {
    const cx = canvas.width  / 2 + cam.x;
    const cy = canvas.height / 2 + cam.y;

    const rx = -wz;
    const rz = wx;

    return [
        cx + rx * cam.scale,
        cy + rz * cam.scale
    ];
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const rects = buildRects(params);

    for (const r of rects) {
        ctx.fillStyle   = FILL;
        ctx.strokeStyle = STROKE;
        ctx.lineWidth   = 1.5;

        ctx.beginPath();
        if (r.points) {
            const [x0, z0] = worldToScreen(r.points[0][0], r.points[0][1]);
            ctx.moveTo(x0, z0);
            for (let i = 1; i < r.points.length; i++) {
                const [x, z] = worldToScreen(r.points[i][0], r.points[i][1]);
                ctx.lineTo(x, z);
            }
            ctx.closePath();
        } else {
            const pts = [
                [r.x,       r.z],
                [r.x + r.w, r.z],
                [r.x + r.w, r.z + r.d],
                [r.x,       r.z + r.d]
            ];

            const [x0, y0] = worldToScreen(pts[0][0], pts[0][1]);

            ctx.moveTo(x0, y0);

            for (let i = 1; i < pts.length; i++) {
                const [x, y] = worldToScreen(pts[i][0], pts[i][1]);
                ctx.lineTo(x, y);
            }

            ctx.closePath();
        }
        ctx.fill();
        ctx.stroke();
    }
}

// ─────────────────────────────────────────────
//  API
// ─────────────────────────────────────────────

window.updateParams = (w, h, d, count, mode, diff = 0, middle = 0) => {
    params = {
        w: w / 100,
        h: h / 100,
        d: d / 100,
        count: Math.max(1, count),
        mode,
        diff: Math.max(0, diff),
        middle,
    };

    if (!initialized) {
        const totalSize = Math.max(w, d * count) / 100;

        cam.scale =
            Math.min(canvas.width, canvas.height) /
            (totalSize * 2.5);

        cam.x = 0;
        cam.y = 0;

        initialized = true;
    }

    draw();
};

// ─────────────────────────────────────────────
//  Старт
// ─────────────────────────────────────────────

resize();
</script>
</body>
</html>

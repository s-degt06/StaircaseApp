<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stacked Prisms</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #f0f0f0;
}
canvas { display: block; }
</style>

<script src="three.min.js"></script>
<script src="OrbitControls.js"></script>

<script>
let scene, camera, renderer, controls, mainGroup;

let params = { w: 2, h: 1, d: 1, count: 1, mode: 0 };
const COLOR = 0x2196F3;

window.onload = () => {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf0f0f0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(10, 10, 10);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enablePan = false;

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const light = new THREE.DirectionalLight(0xffffff, 0.8);
    light.position.set(5, 10, 7);
    scene.add(light);

    updateScene();
    animate();
    window.addEventListener("resize", onResize);
};

// ===== CUSTOM GEOMETRY =====
function createCustomGeometry(w, h, d) {
    const hw = w / 2, hh = h / 2, hd = d / 2;

    const vertices = new Float32Array([
        -hw, -hh,  hd,
         hw, -hh,  hd,
        -hw,  hh,  hd,
         hw,  hh,  hd,
        -hw,  hh, -hd,
         hw,  hh, -hd
    ]);

    const indices = [
        0,1,2, 1,3,2,
        2,3,4, 3,5,4,
        5,1,0, 4,5,0,
        0,2,4,
        1,5,3
    ];

    const g = new THREE.BufferGeometry();
    g.setAttribute("position", new THREE.BufferAttribute(vertices, 3));
    g.setIndex(indices);
    g.computeVertexNormals();
    return g;
}

// ===== SCENE UPDATE =====
function updateScene() {
    if (mainGroup) scene.remove(mainGroup);
    mainGroup = new THREE.Group();

    const blockGeo = createCustomGeometry(params.w, params.h, params.d);
    const mat = new THREE.MeshLambertMaterial({ color: COLOR, side: THREE.DoubleSide });
    const edgeMat = new THREE.LineBasicMaterial({ color: 0x000000 });
    const blockEdges = new THREE.EdgesGeometry(blockGeo);

    const addBlock = (x, y, z, flipZ = false) => {
        const m = new THREE.Mesh(blockGeo, mat);
        m.add(new THREE.LineSegments(blockEdges, edgeMat));
        m.position.set(x, y, z);
        if (flipZ) m.scale.z = -1;
        mainGroup.add(m);
    };

    // ===== MODE 1 =====
    if (params.mode === 0) {
        for (let i = 0; i < params.count; i++) {
            addBlock(0, i * params.h, -i * params.d);
        }
    }

    // ===== MODE 2 & 3 =====
    if (params.mode === 1 || params.mode === 2) {
        const mirror = params.mode === 2 ? -1 : 1;

        const boxGeo = new THREE.BoxGeometry(2 * params.w, params.h, params.d);
        const box = new THREE.Mesh(boxGeo, mat);
        box.add(new THREE.LineSegments(new THREE.EdgesGeometry(boxGeo), edgeMat));
        mainGroup.add(box);

        const leftX  = -params.w / 2 * mirror;
        const rightX =  params.w / 2 * mirror;
        const baseZ = -params.d;

        // нижняя колонна
        for (let i = 0; i < params.count; i++) {
            addBlock(
                leftX,
                -(i + 1) * params.h,
                baseZ - i * params.d,
                true
            );
        }

        // верхняя колонна
        for (let i = 0; i < params.count; i++) {
            addBlock(
                rightX,
                (i + 1) * params.h,
                baseZ - i * params.d
            );
        }
    }

    // ===== MODE 4 =====
    if (params.mode === 3) {

        // центральный параллелепипед
        const boxGeo = new THREE.BoxGeometry(params.w, params.h, params.w);
        const box = new THREE.Mesh(boxGeo, mat);
        box.add(new THREE.LineSegments(new THREE.EdgesGeometry(boxGeo), edgeMat));
        mainGroup.add(box);

        const half = params.w / 2;

        // ===== НИЖНЯЯ КОЛОННА =====
        const baseZ = -half - params.d / 2;

        for (let i = 0; i < params.count; i++) {
            addBlock(
                0,                              // по центру X
                -(i + 1) * params.h,            // вниз
                baseZ - i * params.d,            // назад
                true                             // разворот как у нижней
            );
        }

        // ===== ВЕРХНЯЯ КОЛОННА =====
        const firstX = params.w / 2 + params.d / 2; // первый блок прижат к правой грани параллелепипеда
        const zCenter = 0;

        for (let i = 0; i < params.count; i++) {
            const m = new THREE.Mesh(blockGeo, mat);
            m.add(new THREE.LineSegments(blockEdges, edgeMat));

            m.position.set(
                firstX + i * params.d,   // смещение по X для соприкосновения блоков
                (i + 1) * params.h,      // вверх
                zCenter
            );

            m.rotation.y = Math.PI * 1.5; // поворот на 270° (90 + 180)

            mainGroup.add(m);
        }
    }

    // ===== MODE 5 =====
    if (params.mode === 4) {

        // центральный параллелепипед
        const boxGeo = new THREE.BoxGeometry(params.w, params.h, params.w);
        const box = new THREE.Mesh(boxGeo, mat);
        box.add(new THREE.LineSegments(new THREE.EdgesGeometry(boxGeo), edgeMat));
        mainGroup.add(box);

        const half = params.w / 2;

        // ===== НИЖНЯЯ КОЛОННА (зеркально) =====
        const baseZ = -half - params.d / 2;

        for (let i = 0; i < params.count; i++) {
            addBlock(
                0,                              // по центру X
                -(i + 1) * params.h,            // вниз
                baseZ - i * params.d,            // назад
                true                             // разворот как у нижней
            );
        }

        // ===== ВЕРХНЯЯ КОЛОННА (зеркально) =====
        const firstX = -(params.w / 2 + params.d / 2); // прижат к левой грани
        const zCenter = 0;

        for (let i = 0; i < params.count; i++) {
            const m = new THREE.Mesh(blockGeo, mat);
            m.add(new THREE.LineSegments(blockEdges, edgeMat));

            m.position.set(
                firstX - i * params.d,  // зеркально по X
                (i + 1) * params.h,      // вверх
                zCenter
            );

            m.rotation.y = Math.PI / 2; // поворот на 90° для зеркальной ориентации

            mainGroup.add(m);
        }
    }

    // центрирование
    const box = new THREE.Box3().setFromObject(mainGroup);
    const center = box.getCenter(new THREE.Vector3());
    mainGroup.position.sub(center);

    scene.add(mainGroup);
}

window.updateParams = (w, h, d, count, mode) => {
    params.w = w;
    params.h = h;
    params.d = d;
    params.count = Math.max(1, count);
    params.mode = mode;
    updateScene();
};

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

function onResize() {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
}
</script>
</head>
<body></body>
</html>

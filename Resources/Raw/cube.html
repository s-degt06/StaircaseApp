<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stacked Prisms</title>
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f0f0f0; }
canvas { display: block; }
</style>
<script src="three.min.js"></script>
<script src="OrbitControls.js"></script>
<script>
let scene, camera, renderer, controls, mainGroup;
let params = { w: 2, h: 1, d: 1, count: 1, mode: 0, diff: 0, middle: 0 };

const PRISM_COLOR = 0x2196F3;
const EDGE_COLOR  = 0x000000;

window.onload = () => {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf0f0f0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(10, 10, 10);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enablePan = false;

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(5, 10, 7);
    scene.add(sun);

    updateScene();
    animate();

    window.addEventListener("resize", () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    });
};

// ─────────────────────────────────────────────
//  Фабрики геометрий
// ─────────────────────────────────────────────

function makePrismGeometry(w, h, d) {
    const hw = w / 2, hh = h / 2, hd = d / 2;
    const verts = new Float32Array([
        -hw, -hh,  hd,
         hw, -hh,  hd,
        -hw,  hh,  hd,
         hw,  hh,  hd,
        -hw,  hh, -hd,
         hw,  hh, -hd,
    ]);
    const idx = [
        0,1,2, 1,3,2,
        2,3,4, 3,5,4,
        5,1,0, 4,5,0,
        0,2,4,
        1,5,3,
    ];
    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.BufferAttribute(verts, 3));
    geo.setIndex(idx);
    geo.computeVertexNormals();
    return geo;
}

function makeMaterials() {
    return {
        face: new THREE.MeshLambertMaterial({ color: PRISM_COLOR, side: THREE.DoubleSide }),
        edge: new THREE.LineBasicMaterial({ color: EDGE_COLOR }),
    };
}

function makePrismMesh(geo, mat) {
    const mesh = new THREE.Mesh(geo, mat.face);
    mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), mat.edge));
    return mesh;
}

function makeBoxMesh(w, h, d, mat) {
    const geo = new THREE.BoxGeometry(w, h, d);
    const mesh = new THREE.Mesh(geo, mat.face);
    mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), mat.edge));
    return mesh;
}

// ─────────────────────────────────────────────
//  Центральный блок между пролётами
//  middle=0 → один прямоугольник 2w×h×d
//  middle=2 → два квадрата w×h×w со ступенькой
// ─────────────────────────────────────────────

/**
 * Возвращает { group, depthUsed }
 * depthUsed — сколько места по Z занял центральный блок,
 * чтобы хвосты знали, откуда начинать.
 */
function makeCenterBlock(mat, { w, h, d, middle }) {
    const group = new THREE.Group();

    if (middle === 0) {
        // Один прямоугольный блок 2w × h × d
        group.add(makeBoxMesh(2 * w, h, w, mat));
        return { group, depthUsed: w, heightUsed: 1 };
    }

    if (middle === 2) {
        // Две квадратные ступени w×h×w, смещённые по Y и Z
        // Нижняя ступень: на уровне 0, сзади
        const step1 = makeBoxMesh(w, h, w, mat);
        step1.position.set(-w / 2, 0, 0);
        group.add(step1);

        // Верхняя ступень: на h выше, спереди
        const step2 = makeBoxMesh(w, h, w, mat);
        step2.position.set(w / 2, h, 0);
        group.add(step2);

        // Общая глубина = два квадрата подряд
        return { group, depthUsed: w, heightUsed: 2 };
    }

    // Fallback
    group.add(makeBoxMesh(2 * w, h, w, mat));
    return { group, depthUsed: w, heightUsed: 2 };
}

// ─────────────────────────────────────────────
//  Построители режимов
// ─────────────────────────────────────────────

function buildMode1(group, geo, mat, { w, h, d, count }) {
    for (let i = 0; i < count; i++) {
        const mesh = makePrismMesh(geo, mat);
        mesh.position.set(0, i * h, -i * d);
        group.add(mesh);
    }
}

/**
 * Mode 2 / 3 — два пролёта + центральный блок.
 * diff: нижний пролёт на diff ступеней меньше верхнего.
 * mirror: +1 для mode2, -1 для mode3.
 */
function buildModeMirrored(group, geo, mat, { w, h, d, count, diff, middle }, mirror) {
    const { group: center, depthUsed, heightUsed } = makeCenterBlock(mat, { w, h, d, middle });
    group.add(center);

    const leftEdgeX  = -w / 2 * mirror;
    const rightEdgeX =  w / 2 * mirror;
    const startZ = -(depthUsed / 2 + d / 2);

    const countLower = Math.max(1, count - diff);
    const countUpper = count;

    for (let i = 0; i < countLower; i++) {
        const mesh = makePrismMesh(geo, mat);
        mesh.position.set(leftEdgeX, -(i + 1) * h, startZ - i * d);
        mesh.scale.z = -1;
        group.add(mesh);
    }

    for (let i = 0; i < countUpper; i++) {
        const mesh = makePrismMesh(geo, mat);
        mesh.position.set(rightEdgeX, (heightUsed + i) * h, startZ - i * d);
        group.add(mesh);
    }
}
 
/**
 * Mode 4 / 5 — квадратный центр + два ортогональных пролёта.
 * diff: нижний пролёт на diff ступеней меньше верхнего.
 * sideSign: +1 для mode4, -1 для mode5.
 */
function buildModeOrthogonal(group, geo, mat, { w, h, d, count, diff }, sideSign) {
    group.add(makeBoxMesh(w, h, w, mat));

    const halfW = w / 2;
    const halfD = d / 2;

    const countLower = Math.max(1, count - diff);
    const countUpper = count;

    // Нижний пролёт (по -Z)
    const backStartZ = -(halfW + halfD);
    for (let i = 0; i < countLower; i++) {
        const mesh = makePrismMesh(geo, mat);
        mesh.position.set(0, -(i + 1) * h, backStartZ - i * d);
        mesh.scale.z = -1;
        group.add(mesh);
    }

    // Верхний пролёт (по ±X)
    const sideStartX = sideSign * (halfW + halfD);
    const rotY = sideSign > 0 ? -Math.PI / 2 : Math.PI / 2;
    for (let i = 0; i < countUpper; i++) {
        const mesh = makePrismMesh(geo, mat);
        mesh.position.set(sideStartX + sideSign * i * d, (i + 1) * h, 0);
        mesh.rotation.y = rotY;
        group.add(mesh);
    }
}

// ─────────────────────────────────────────────
//  Обновление сцены
// ─────────────────────────────────────────────

function updateScene() {
    if (mainGroup) scene.remove(mainGroup);
    mainGroup = new THREE.Group();

    const geo = makePrismGeometry(params.w, params.h, params.d);
    const mat = makeMaterials();

    switch (params.mode) {
        case 0: buildMode1(mainGroup, geo, mat, params); break;
        case 1: buildModeMirrored(mainGroup, geo, mat, params, +1); break;
        case 2: buildModeMirrored(mainGroup, geo, mat, params, -1); break;
        case 3: buildModeOrthogonal(mainGroup, geo, mat, params, +1); break;
        case 4: buildModeOrthogonal(mainGroup, geo, mat, params, -1); break;
    }

    const bbox = new THREE.Box3().setFromObject(mainGroup);
    mainGroup.position.sub(bbox.getCenter(new THREE.Vector3()));
    scene.add(mainGroup);
}

window.updateParams = (w, h, d, count, mode, diff = 0, middle = 0) => {
    params = {
        w: w / 100,
        h: h / 100,
        d: d / 100,
        count: Math.max(1, count),
        mode,
        diff:   Math.max(0, diff),
        middle: middle,
    };
    updateScene();
};

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
</script>
</head>
<body></body>
</html>

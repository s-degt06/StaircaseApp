<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stacked Prisms</title>
<style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f0f0f0; }
    canvas { display: block; }
</style>
<script src="three.min.js"></script>
<script src="OrbitControls.js"></script>
<script>
let scene, renderer, mainGroup;
let camera, controls;

// Параметры по умолчанию
let params = { w: 2, h: 1, d: 1, count: 1 };
const COLOR = 0x2196F3;

window.onload = () => {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf0f0f0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const aspect = window.innerWidth / window.innerHeight;
    camera = new THREE.PerspectiveCamera(60, aspect, 0.1, 1000);
    camera.position.set(10, 10, 10);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableRotate = true;
    controls.enableZoom = true;
    controls.enablePan = false;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    updateScene();
    window.addEventListener("resize", onResize);
    animate();
};

// ===== Создание "призмы" =====
function createCustomGeometry(width, height, depth) {
    const geometry = new THREE.BufferGeometry();
    const hw = width / 2;
    const hh = height / 2;
    const hd = depth / 2;

    const vertices = new Float32Array([
        -hw, -hh,  hd, // 0: L-Bot-Front
         hw, -hh,  hd, // 1: R-Bot-Front
        -hw,  hh,  hd, // 2: L-Top-Front
         hw,  hh,  hd, // 3: R-Top-Front
        -hw,  hh, -hd, // 4: L-Top-Back
         hw,  hh, -hd  // 5: R-Top-Back
    ]);

    const indices = [
        0,1,2, 1,3,2,    // Перед
        2,3,4, 3,5,4,    // Верх
        5,1,0, 4,5,0,    // Диагональ
        0,2,4,           // Лево
        1,5,3            // Право
    ];

    geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
    geometry.setIndex(indices);
    geometry.computeVertexNormals();
    return geometry;
}

// ===== Перерисовка сцены =====
function updateScene() {
    // Обновляем параметры count ≥ 1
    params.count = Math.max(1, parseInt(params.count));

    if (mainGroup) {
        scene.remove(mainGroup);
        mainGroup.traverse((obj) => {
            if(obj.geometry) obj.geometry.dispose();
            if(obj.material) {
                if(Array.isArray(obj.material)) obj.material.forEach(m=>m.dispose());
                else obj.material.dispose();
            }
        });
    }

    mainGroup = new THREE.Group();
    const geometry = createCustomGeometry(params.w, params.h, params.d);
    const material = new THREE.MeshLambertMaterial({ color: COLOR, side: THREE.DoubleSide });
    const edgesGeo = new THREE.EdgesGeometry(geometry);
    const lineMat = new THREE.LineBasicMaterial({ color: 0x000000 });

    for (let i = 0; i < params.count; i++) {
        const mesh = new THREE.Mesh(geometry, material);
        const edges = new THREE.LineSegments(edgesGeo, lineMat);
        mesh.add(edges);

        mesh.position.y = i * params.h;
        mesh.position.z = i * -params.d;
        mainGroup.add(mesh);
    }

    // Центрируем группу
    const box = new THREE.Box3().setFromObject(mainGroup);
    const center = box.getCenter(new THREE.Vector3());
    mainGroup.position.x = -center.x;
    mainGroup.position.y = -center.y;
    mainGroup.position.z = -center.z;

    scene.add(mainGroup);
}

// ===== API MAUI =====
window.updateParams = (w, h, d, count) => {
    params.w = Math.max(0.1, w);
    params.h = Math.max(0.1, h);
    params.d = Math.max(0.1, d);
    params.count = Math.max(1, parseInt(count));
    updateScene();
};

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

function onResize() {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
}
</script>
</head>
<body></body>
</html>
